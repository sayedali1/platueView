<div
  class="
    flex
    
    flex-col
    sm:flex-row

    gap-3
    md:gap-4

    justify-end

    mt-8
    md:mt-10
  "
>

  <div
    *ngFor="let item of stats"
    class="
      bg-white/10
      backdrop-blur-md
      border
      border-white/20

      rounded-2xl
      md:rounded-3xl

      px-4
      md:px-6
      lg:px-8

      py-2
      md:py-5
      lg:py-6

    w-full
    sm:w-auto

    min-w-35
    md:min-w-42.5
    lg:min-w-47.5

      text-right

      transition-all
      duration-500

      hover:bg-white/20
      hover:scale-105
    "
  >

    <p
      class="
       text-sm
       md:text-base
       lg:text-lg

        text-gray-200
      "
    >
      {{ item.title }}
    </p>

    <h3
      class="
        text-lg
        md:text-2xl
        lg:text-3xl

        font-bold
        text-white

        mt-2
        md:mt-3
      "
    >
      {{ item.value }}
    </h3>

  </div>

</div>
