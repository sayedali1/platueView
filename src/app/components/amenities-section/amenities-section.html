<section
  class="
    relative

    h-screen

    snap-start

    px-1
    sm:px-2
    md:px-3

    py-1
    sm:py-2
    md:py-3
  "

  id="amenities"
>

  <!-- MAIN CONTAINER -->
  <div
    class="
      relative

      h-full

      rounded-[35px]

      overflow-hidden

      bg-black
    "
  >

    <!-- DYNAMIC BACKGROUND -->
    <div
      class="
        absolute
        inset-0

        z-0

        overflow-hidden
      "
    >

      <img
        *ngIf="imageUpdateCounter"

        [src]="getCurrentImage()"

        [style.opacity]="
          isTransitioning ? 0 : 1
        "

        [style.transition]="
          'opacity 0.5s ease-in-out'
        "

        class="
          w-full
          h-full

          object-cover
          object-center
        "
      />

    </div>

    <!-- DARK OVERLAY -->
    <div
      class="
        absolute
        inset-0

        bg-black/10

        z-10
      "
    ></div>

    <!-- GRADIENT -->
    <div
      class="
        absolute
        inset-0

        bg-gradient-to-l
        from-black/40
        via-black/50
        to-transparent

        z-10
      "
    ></div>

    <!-- CONTENT -->
    <div
      class="
        relative
        z-20

        h-full

        flex
        flex-col
        justify-between

        p-5
        md:p-8
        lg:p-12
      "
    >

      <!-- TOP -->
      <div
        class="
          flex
          justify-end
        "
      >

        <!-- TEXT -->
        <div
          class="
            max-w-[320px]
            sm:max-w-[420px]
            md:max-w-[620px]

            text-right

            mt-10
            md:mt-16
          "
        >

          <!-- SMALL TITLE -->
          <p
            class="
              text-[#B89B72]

              text-xs
              md:text-base

              mb-4
            "
          >
            مرافق وخدمات متكاملة
          </p>

          <!-- MAIN TITLE -->
          <h2
            class="
              text-3xl
              sm:text-4xl
              md:text-6xl
              lg:text-7xl

              font-bold

              text-white

              leading-tight
            "
          >
            أسلوب حياة متكامل
          </h2>

          <!-- DYNAMIC SUBTITLE -->
          <h3
            class="
              mt-6
              md:mt-8

              text-lg
              sm:text-2xl
              md:text-4xl

              font-bold

              text-white
            "
          >
            {{ amenities[activeAmenity].subtitle }}
          </h3>

          <!-- DESCRIPTION -->
          <p
            class="
              mt-4
              md:mt-6

              text-sm
              md:text-lg

              leading-7
              md:leading-9

              text-gray-300
            "
          >
            {{ amenities[activeAmenity].description }}
          </p>

        </div>

      </div>

      <!-- BOTTOM -->
      <div
        class="
          relative

          z-30

          border-t
          border-white/10

          pt-5
          md:pt-8
        "
      >

        <!-- NAVIGATION -->
        <div
          class="
            overflow-x-auto
            md:overflow-visible

            scrollbar-hide
          "
        >

          <!-- MOBILE = horizontal rail -->
          <!-- DESKTOP = grid -->
          <div
            class="
              flex
              md:grid

              md:grid-cols-3
              lg:grid-cols-6

              gap-3
              md:gap-6
            "
          >

            <!-- ITEM -->
            <div
              *ngFor="
                let item of amenities;
                let i = index
              "

              class="
                group

                cursor-pointer

                transition-all
                duration-500

                shrink-0

                w-[140px]
                md:w-auto
              "

              (mouseenter)="changeAmenity(i)"
              (click)="changeAmenity(i)"
            >

              <!-- CARD -->
              <!-- TOP LINE -->
<div
  class="
    h-[3px]

    rounded-full

    mb-4
    md:mb-5

    transition-all
    duration-500
  "

  [ngClass]="{

    'bg-[#7B001C] w-full':
      activeAmenity === i,

    'bg-white/20 w-[35%] group-hover:w-full':
      activeAmenity !== i

  }"
></div>

<!-- CONTENT -->
<div
  class="
    flex
    flex-col

    items-start

    gap-3
    md:gap-4
  "
>

  <!-- ICON -->
  <div
    class="
      w-12
      h-12

      md:w-14
      md:h-14

      rounded-2xl

      backdrop-blur-xl

      border

      flex
      items-center
      justify-center

      transition-all
      duration-500
    "

    [ngClass]="{

      'bg-[#7B001C] border-[#7B001C] text-white scale-110':
        activeAmenity === i,

      'bg-white/5 border-white/10 text-gray-300 group-hover:bg-white/10':
        activeAmenity !== i

    }"
  >

    <lucide-angular

      [img]="item.icon"

      class="
        w-5
        h-5

        md:w-6
        md:h-6
      "
    >
    </lucide-angular>

  </div>

  <!-- TITLE -->
  <div>

    <h3
      class="
        text-sm
        md:text-base

        font-semibold

        leading-6

        transition-all
        duration-300
      "

      [ngClass]="{

        'text-white':
          activeAmenity === i,

        'text-gray-400 group-hover:text-white':
          activeAmenity !== i

      }"
    >
      {{ item.title }}
    </h3>

  </div>

</div>
            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</section>
