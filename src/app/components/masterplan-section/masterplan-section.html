<section
  class="
    h-screen
    snap-start

    px-2
    md:px-3

    py-2
    md:py-3
  "
  id="masterplan"
>

  <!-- Main Container -->
  <div
    class="
      relative

      h-full

      rounded-[35px]

      overflow-hidden

      bg-black
    "
  >

    <!-- Background Image -->
    <img
      src="images/masterplan2.jpg"

      class="
        absolute
        inset-0

        w-full
        h-full

        object-cover
      "
    />

    <!-- Main Overlay -->
    <div
      class="
        absolute
        inset-0

        bg-black/35
      "
    ></div>

    <!-- Right Gradient -->
    <div
      class="
        absolute
        inset-0

        bg-gradient-to-l
        from-black/90
        via-black/40
        to-transparent
      "
    ></div>

    <!-- Soft Red Glow -->
    <div
      class="
        absolute
        top-0
        right-0

        w-[40%]
        h-full

        bg-[#7B001C]/10

        blur-3xl
      "
    ></div>

    <!-- ===================== -->
    <!-- HOTSPOTS -->
    <!-- ===================== -->

    <!-- Hotspot 01 -->
    <div
      class="
        absolute

        top-[18%]
        left-[48%]

        z-20

        group

        cursor-pointer
      "

      (mouseenter)="activeHotspot = 1"
      (mouseleave)="activeHotspot = null"
    >

      <!-- Pulse -->
      <div
        class="
          absolute
          inset-0

          rounded-full

          bg-[#7B001C]/40

          animate-ping
        "
      ></div>

      <!-- Main Circle -->
      <div
        class="
          relative

          w-11
          h-11

          rounded-full

          border
          border-white/20

          flex
          items-center
          justify-center

          text-white
          text-sm
          font-bold

          shadow-2xl

          transition-all
          duration-300

          group-hover:scale-110
        "

        [ngClass]="{
          'bg-[#B89B72] scale-110': activeHotspot === 1,
          'bg-[#7B001C]': activeHotspot !== 1
        }"
      >
        01
      </div>

      <!-- Tooltip -->
      <div
        class="
          absolute

          bottom-[130%]
          left-1/2

          -translate-x-1/2

          whitespace-nowrap

          bg-black/80

          backdrop-blur-xl

          border
          border-white/10

          rounded-xl

          px-4
          py-2

          text-white
          text-sm

          opacity-0

          group-hover:opacity-100

          transition-all
          duration-300
        "
      >
        النادي الاجتماعي
      </div>

    </div>

    <!-- Hotspot 02 -->
    <div
      class="
        absolute

        top-[58%]
        left-[57%]

        z-20

        group

        cursor-pointer
      "

      (mouseenter)="activeHotspot = 2"
      (mouseleave)="activeHotspot = null"
    >

      <div
        class="
          absolute
          inset-0

          rounded-full

          bg-[#7B001C]/40

          animate-ping
        "
      ></div>

      <div
        class="
          relative

          w-11
          h-11

          rounded-full

          border
          border-white/20

          flex
          items-center
          justify-center

          text-white
          text-sm
          font-bold

          shadow-2xl

          transition-all
          duration-300

          group-hover:scale-110
        "

        [ngClass]="{
          'bg-[#B89B72] scale-110': activeHotspot === 2,
          'bg-[#7B001C]': activeHotspot !== 2
        }"
      >
        02
      </div>

      <div
        class="
          absolute

          bottom-[130%]
          left-1/2

          -translate-x-1/2

          whitespace-nowrap

          bg-black/80

          backdrop-blur-xl

          border
          border-white/10

          rounded-xl

          px-4
          py-2

          text-white
          text-sm

          opacity-0

          group-hover:opacity-100

          transition-all
          duration-300
        "
      >
        حمام السباحة
      </div>

    </div>

    <!-- Hotspot 03 -->
    <div
      class="
        absolute

        top-[32%]
        left-[72%]

        z-20

        group

        cursor-pointer
      "

      (mouseenter)="activeHotspot = 3"
      (mouseleave)="activeHotspot = null"
    >

      <div
        class="
          absolute
          inset-0

          rounded-full

          bg-[#7B001C]/40

          animate-ping
        "
      ></div>

      <div
        class="
          relative

          w-11
          h-11

          rounded-full

          border
          border-white/20

          flex
          items-center
          justify-center

          text-white
          text-sm
          font-bold

          shadow-2xl

          transition-all
          duration-300

          group-hover:scale-110
        "

        [ngClass]="{
          'bg-[#B89B72] scale-110': activeHotspot === 3,
          'bg-[#7B001C]': activeHotspot !== 3
        }"
      >
        03
      </div>

      <div
        class="
          absolute

          bottom-[130%]
          left-1/2

          -translate-x-1/2

          whitespace-nowrap

          bg-black/80

          backdrop-blur-xl

          border
          border-white/10

          rounded-xl

          px-4
          py-2

          text-white
          text-sm

          opacity-0

          group-hover:opacity-100

          transition-all
          duration-300
        "
      >
        البوابة الرئيسية
      </div>

    </div>

    <!-- ===================== -->
    <!-- CONTENT -->
    <!-- ===================== -->

    <div
      class="
        relative
        z-10

        h-full

        flex
        items-center
        justify-end

        p-4
        md:p-8
        lg:p-12
      "
    >

      <!-- Content Wrapper -->
      <div
        class="
          max-w-[420px]

          text-right
        "
      >

        <!-- Small Title -->
        <p
          class="
            text-[#B89B72]

            text-sm
            md:text-base

            mb-3
          "
        >
          اكتشف تفاصيل المشروع
        </p>

        <!-- Main Title -->
        <h2
          class="
            text-4xl
            md:text-5xl
            lg:text-7xl

            font-bold

            text-white

            leading-tight
          "
        >
          المخطط العام
        </h2>

        <!-- Description -->
        <p
          class="
            mt-5

            text-sm
            md:text-lg

            leading-7
            md:leading-9

            text-gray-200
          "
        >
          تصميم هندسي متكامل يضمن توزيع مثالي
          للمساحات الخضراء والخدمات
          لتوفير تجربة معيشية فاخرة.
        </p>

        <!-- Floating Card -->
        <div
          class="
            mt-8

            bg-black/40

            backdrop-blur-xl

            border
            border-white/10

            rounded-[30px]

            p-5
            md:p-6
          "
        >

          <!-- Card Title -->
          <h3
            class="
              text-white

              text-2xl

              font-bold
            "
          >
            تفاصيل المخطط
          </h3>

          <!-- Items -->
          <div
            class="
              mt-6

              flex
              flex-col

              gap-5
            "
          >

            <!-- Item 01 -->
            <div
              class="
                flex
                items-center
                justify-between

                cursor-pointer

                transition-all
                duration-300
              "

              (mouseenter)="activeHotspot = 1"
              (mouseleave)="activeHotspot = null"
            >

              <span
                class="
                  text-sm
                  md:text-base

                  transition-all
                  duration-300
                "

                [class.text-[#B89B72]]="activeHotspot === 1"
                [class.text-white]="activeHotspot !== 1"
              >
                المدخل الرئيسي
              </span>

              <div
                class="
                  w-9
                  h-9

                  rounded-full

                  flex
                  items-center
                  justify-center

                  text-white
                  text-xs

                  transition-all
                  duration-300
                "

                [class.bg-[#B89B72]]="activeHotspot === 1"
                [class.bg-[#7B001C]]="activeHotspot !== 1"

                [class.scale-110]="activeHotspot === 1"
              >
                01
              </div>
              
              

            </div>

            <!-- Item 02 -->
            <div
  class="
    flex
    items-center
    justify-between

    cursor-pointer

    transition-all
    duration-300
  "

  (mouseenter)="activeHotspot = 2"
  (mouseleave)="activeHotspot = null"
>

  <span
    class="
      text-sm
      md:text-base

      transition-all
      duration-300
    "

    [class.text-[#B89B72]]="activeHotspot === 2"
    [class.text-white]="activeHotspot !== 2"
  >
    النادي الاجتماعي
  </span>

  <div
    class="
      w-9
      h-9

      rounded-full

      flex
      items-center
      justify-center

      text-white
      text-xs

      transition-all
      duration-300
    "

    [class.bg-[#B89B72]]="activeHotspot === 2"
    [class.bg-[#7B001C]]="activeHotspot !== 2"

    [class.scale-110]="activeHotspot === 2"
  >
    02
  </div>

            </div>

            <!-- Item 03 -->
            <div
              class="
                flex
                items-center
                justify-between

                cursor-pointer

                transition-all
                duration-300
              "

              (mouseenter)="activeHotspot = 3"
              (mouseleave)="activeHotspot = null"
            >

              <span
                class="
                  text-sm
                  md:text-base

                  transition-all
                  duration-300
                "

                [class.text-[#B89B72]]="activeHotspot === 3"
                [class.text-white]="activeHotspot !== 3"
              >
                المدخل الرئيسي
              </span>

              <div
                class="
                  w-9
                  h-9

                  rounded-full

                  flex
                  items-center
                  justify-center

                  text-white
                  text-xs

                  transition-all
                  duration-300
                "

                [class.bg-[#B89B72]]="activeHotspot === 3"
                [class.bg-[#7B001C]]="activeHotspot !== 3"

                [class.scale-110]="activeHotspot === 3"
              >
                03
              </div>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</section>
