<section
  id="masterplan"

  class="
    relative

    h-screen

    overflow-hidden

    rounded-none
    md:rounded-[35px]

    mx-0
    md:mx-3

    mt-0
    md:mt-3
  "
>

  <!-- BACKGROUND IMAGE -->
  <picture>
    <source media="(max-width: 767px)" srcset="images/topviewplan4-3.png" />
    <img
      src="images/topviewplan4.png"

      alt="Master Plan"

      class="
        absolute
        inset-0

        w-full
        h-full

        object-cover
        object-center

        scale-105
        md:scale-100
      "
    />
  </picture>

  <!-- OVERLAY -->
  <div
    class="
      absolute
      inset-0

      bg-black/25

      z-10
    "
  ></div>

  <!-- CONTENT - HIDDEN ON MOBILE, VISIBLE ON DESKTOP -->
  <div
    class="
      hidden
      md:flex

      relative
      z-20

      min-h-screen

      items-center
      justify-between

      px-3
      sm:px-5
      md:px-10
      lg:px-16

      pt-6
      sm:pt-8
      md:pt-10

      pb-20
      sm:pb-24
      md:pb-28
      lg:pb-36
    "
  >

    <!-- LEFT CONTENT -->
    <div
      class="
        max-w-[280px]
        md:max-w-[500px]

        mt-20
        md:mt-44
        lg:mt-52
      "
    >

      <!-- TITLE -->
      <h2
        class="
          text-white

          text-4xl
          md:text-7xl
          lg:text-[95px]

          font-black

          leading-[0.9]

          tracking-tight
        "
      >
        المخطط العام
      </h2>

      <!-- DESCRIPTION -->
      <p
        class="
          mt-5

          text-white/75

          text-sm
          md:text-lg

          leading-7
          md:leading-10
        "
      >
        تصميم هندسي متكامل يضمن توزيع مثالي
        للمساحات الخضراء والخدمات لتوفير
        تجربة معيشية فاخرة.
      </p>

    </div>

  </div>

  <!-- MOBILE CONTENT - SHOWN ONLY ON PHONE -->
  <div
    class="
      md:hidden

      relative
      z-20

      flex
      flex-col
      justify-end

      h-auto
      min-h-[280px]

      px-3
      py-4
    "
  >

    <!-- MOBILE TITLE & DESCRIPTION -->
    <div
      class="
        bg-gradient-to-t
        from-black/90
        via-black/70
        to-transparent

        px-3
        py-6
        -mx-3
        -mb-4
      "
    >

      <h2
        class="
          text-white

          text-2xl
          sm:text-3xl

          font-black

          leading-tight

          mb-2
        "
      >
        المخطط العام
      </h2>

      <p
        class="
          text-white/75

          text-xs
          sm:text-sm

          leading-6
        "
      >
        تصميم هندسي متكامل يضمن توزيع مثالي للمساحات الخضراء
      </p>

    </div>

  </div>

  <!-- HOTSPOTS - VISIBLE ON ALL SCREENS -->
  <div
    *ngFor="
      let item of currentHotspots;
      let i = index
    "

    class="
      absolute

      z-30

      group

      hotspot
    "

    [ngClass]="{
      'hotspot-mobile': true
    }"

    [style.top]="item.top"
    [style.left]="item.left"

    [style.--mobile-top]="item.mobileTop"
    [style.--mobile-left]="item.mobileLeft"
  >

    <!-- PULSE -->
    <div
      class="
        absolute
        inset-0

        rounded-full

        bg-[#7B001C]/40

        animate-ping
      "
    ></div>

    <!-- MAIN -->
    <div
      class="
        relative

        w-6
        h-6
        sm:w-8
        sm:h-8
        md:w-14
        md:h-14

        rounded-full

        bg-[#7B001C]

        border
        border-white/20

        backdrop-blur-md

        flex
        items-center
        justify-center

        text-white

        text-[10px]
        sm:text-xs
        md:text-sm

        font-bold

        shadow-2xl

        cursor-pointer

        transition-all
        duration-500

        hover:scale-110

        md:group-hover:scale-110

        active:scale-95
      "

      (click)="toggleHotspot(i)"
    >

      {{ item.id }}

    </div>

    <!-- TOOLTIP - HOVER ON DESKTOP -->
    <div
      class="
        hidden
        md:block

        absolute

        bottom-[140%]
        left-1/2

        -translate-x-1/2

        min-w-[220px]

        opacity-0
        invisible

        group-hover:opacity-100
        group-hover:visible

        transition-all
        duration-500
      "
    >

      <!-- TOOLTIP BOX -->
      <div
        class="
          bg-black/70

          backdrop-blur-xl

          border
          border-white/10

          rounded-2xl

          px-5

          py-4
        "
      >

        <!-- TITLE -->
        <h4
          class="
            text-white

            text-lg

            font-semibold
          "
        >
          {{ item.title }}
        </h4>

        <!-- DESCRIPTION -->
        <p
          class="
            mt-1

            text-white/65

            text-sm

            leading-6
          "
        >
          {{ item.description }}
        </p>

      </div>

    </div>

    <!-- MOBILE DETAIL CARD - SHOWN WHEN TAPPED -->
    <div
      *ngIf="activeHotspot === i"

      class="
        md:hidden

        fixed

        bottom-0
        left-0
        right-0

        z-50

        bg-gradient-to-t
        from-black/95
        via-black/90
        to-black/80

        backdrop-blur-xl

        border-t
        border-white/10

        px-4
        py-4

        rounded-t-3xl

        animate-in
        slide-in-from-bottom
        duration-300
      "
    >

      <!-- CLOSE BUTTON -->
      <button
        (click)="toggleHotspot(i)"

        class="
          absolute

          top-3
          left-4

          text-white/60

          hover:text-white

          transition-colors
        "
      >

        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >

          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          ></path>

        </svg>

      </button>

      <!-- BADGE -->
      <div
        class="
          flex
          items-center
          gap-3

          mb-3
        "
      >

        <div
          class="
            w-10
            h-10

            rounded-full

            bg-[#7B001C]

            flex
            items-center
            justify-center

            text-white

            text-sm
            font-bold
          "
        >
          {{ item.id }}
        </div>

        <h3
          class="
            text-white

            text-lg

            font-bold
          "
        >
          {{ item.title }}
        </h3>

      </div>

      <!-- DESCRIPTION -->
      <p
        class="
          text-white/75

          text-sm

          leading-7

          pr-8
        "
      >
        {{ item.description }}
      </p>

    </div>

  </div>

  <!-- DETAILS PANEL - DESKTOP VERSION -->
  <div
    class="
      hidden
      md:block

      absolute

      bottom-[4%]
      right-[4%]

      z-40

      w-[460px]

      bg-black/20

      backdrop-blur-xl

      border
      border-white/10

      rounded-[32px]

      p-5
      md:p-6
    "
  >

    <!-- TOP -->
    <div
      class="
        flex
        items-center
        justify-between

        mb-6
      "
    >

      <!-- TITLE -->
      <h3
        class="
          text-white

          text-lg
          md:text-2xl

          font-bold
        "
      >
        تفاصيل المخطط
      </h3>

      <!-- LINE -->
      <div
        class="
          w-10
          md:w-12

          h-[2px]

          bg-[#D6B48A]
        "
      ></div>

    </div>

    <!-- TABS -->
    <div
      class="
        flex
        items-center
        justify-center
        md:justify-start

        flex-wrap

        gap-2
      "
    >

      <!-- TAB -->
      <button

        *ngFor="
          let tab of tabs
        "

        (click)="changeTab(tab.id)"

        class="
          px-3
          md:px-4

          py-1.5
          md:py-2

          rounded-2xl

          text-xs
          md:text-sm

          transition-all
          duration-500
        "

        [ngClass]="{

          'bg-[#B89B72] text-black':
            activeTab === tab.id,

          'bg-white/5 text-white border border-white/10 hover:bg-white/10':
            activeTab !== tab.id

        }"
      >

        {{ tab.label }}

      </button>

    </div>

  </div>

  <!-- MOBILE CATEGORY SELECTOR - ABSOLUTE AT BOTTOM ON MOBILE -->
  <div
    class="
      md:hidden

      absolute
      bottom-0
      left-0
      right-0

      z-40

      bg-black/70

      backdrop-blur-xl

      border-t
      border-white/10

      px-3
      py-2
    "
  >

    <!-- TABS -->
    <div
      class="
        flex
        items-center
        justify-center

        flex-wrap

        gap-1.5
      "
    >

      <!-- TAB -->
      <button

        *ngFor="
          let tab of tabs
        "

        (click)="changeTab(tab.id)"

        class="
          px-2.5
          py-1.5

          rounded-full

          text-xs

          transition-all
          duration-300

          min-h-[32px]
        "

        [ngClass]="{

          'bg-[#B89B72] text-black font-semibold':
            activeTab === tab.id,

          'bg-white/5 text-white/70 hover:bg-white/10':
            activeTab !== tab.id

        }"
      >

        {{ tab.label }}

      </button>

    </div>

  </div>

</section>
