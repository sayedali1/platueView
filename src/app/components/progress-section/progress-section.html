<section
  class="
    h-screen

    snap-start

    px-0
    md:px-3

    py-0
    md:py-3
  "

  id="progress"
>

  <!-- MAIN CONTAINER -->
  <div
    class="
      relative

      h-full

      rounded-none
      md:rounded-[35px]

      overflow-hidden

      bg-black
    "
  >

    <!-- VIDEO BACKGROUND -->
    <video

      [src]="currentVideo"

      autoplay
      muted
      playsinline

      (ended)="onVideoEnded()"

      class="
        absolute
        inset-0

        w-full
        h-full

        object-cover

        z-0
      "
    >
    </video>

    <!-- DARK OVERLAY -->
    <!-- <div
      class="
        absolute
        inset-0

        bg-black/2

        z-10
      "
    ></div> -->

    <!-- CINEMATIC GRADIENT -->
    <div
      class="
        absolute
        inset-0

        bg-gradient-to-l
        from-black/40
        via-black/20
        to-black/10

        z-20
      "
    ></div>

    <!-- CONTENT -->
    <div
      class="
        relative
        z-30

        h-full

        flex
        flex-col
        justify-end
        md:flex-row
        md:items-center
        md:justify-end

        px-5
        sm:px-6
        md:px-10
        lg:px-16
      "
    >

      <!-- CONTENT WRAPPER -->
      <div
        class="
          w-full
          md:max-w-[520px]

          text-right
          md:text-right
        "
      >

     
        <!-- MAIN TITLE -->
        <h2
          class="
            text-red-700

            text-5xl
            md:text-7xl
            lg:text-[90px]

            font-black

            leading-[0.9]

            tracking-tight
          "
        >
          تقدم الأعمال
        </h2>

        <!-- STAGE -->
        <div
          class="
            mt-10
          "
        >

          <!-- STAGE TITLE -->
          <h3
            class="
              text-2xl
              md:text-4xl

              font-bold

              text-white
            "
          >
            {{ stages[activeStage].title }}
          </h3>

          <!-- DESCRIPTION -->
          <p
            class="
              mt-5

              text-sm
              md:text-lg

              leading-7
              md:leading-9

              text-white/70
            "
          >
            {{ stages[activeStage].description }}
          </p>

        </div>

        <!-- HUGE PROGRESS -->
        <div
          class="
            mt-10
          "
        >

          <!-- NUMBER -->
          <h2
            class="
              text-7xl
              md:text-8xl
              lg:text-[120px]

              leading-none

              font-black

              text-white
            "
          >
            {{ stages[activeStage].progress }}
          </h2>

          <!-- LABEL -->
          <p
            class="
              mt-2

              text-white/45

              text-sm
              md:text-base
            "
          >
            نسبة الإنجاز الحالية
          </p>

        </div>

        <!-- PROGRESS BAR -->
        <div
          class="
            mt-8

            h-[4px]

            bg-white/10

            rounded-full

            overflow-hidden
          "
        >

          <!-- ACTIVE BAR -->
          <div
            class="
              h-full

              bg-[#7B001C]

              transition-all
              duration-700
            "

            [style.width]="
              stages[activeStage].progress
            "
          ></div>

        </div>

        <!-- STAGE SELECTORS -->
        <div
          class="
            mt-10

            flex
            flex-nowrap

            gap-2
            md:gap-4

            justify-center
            md:justify-start

            overflow-x-auto

            px-2
          "
        >

          <!-- STAGE -->
          <div

            *ngFor="
              let stage of stages;
              let i = index
            "

            class="
              group

              cursor-pointer
            "

            (mouseenter)="changeStage(i)"
            (click)="changeStage(i)"
          >

            <!-- BUTTON -->
            <div
              class="
                px-3
                md:px-5

                py-2
                md:py-3

                rounded-2xl

                border

                backdrop-blur-xl

                transition-all
                duration-500
              "

              [ngClass]="{

                'bg-[#7B001C] border-[#7B001C] text-white':
                  activeStage === i,

                'bg-white/5 border-white/10 text-white/70 hover:bg-white/10':
                  activeStage !== i

              }"
            >

              <!-- TEXT -->
              <span
                class="
                  text-sm
                  md:text-base

                  font-semibold

                  whitespace-nowrap
                "
              >
                {{ stage.title }}
              </span>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</section>
